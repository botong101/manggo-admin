<div class="flex flex-col gap-0">

  <!-- ── Filter bar ───────────────────────────────────────────────── -->
  <div *ngIf="!loading && totalLocations > 0"
       class="flex items-center gap-2 px-4 py-3 bg-gray-50 border-b border-gray-100 overflow-x-auto"
       style="scrollbar-width:none">

    <!-- All -->
    <button (click)="setFilter('all')"
            class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap border transition-all duration-150"
            [ngClass]="activeFilter === 'all'
              ? 'bg-gray-800 text-white border-gray-800'
              : 'bg-white text-gray-600 border-gray-200 hover:border-gray-400 hover:text-gray-800'">
      <span class="inline-block w-2 h-2 rounded-full bg-gray-400"></span>
      All
      <span class="opacity-60 font-normal">{{ totalLocations }}</span>
    </button>

    <!-- Per-disease -->
    <button *ngFor="let d of uniqueDiseases"
            (click)="setFilter(d)"
            class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap border transition-all duration-150"
            [ngClass]="activeFilter === d
              ? 'text-white border-transparent'
              : 'bg-white text-gray-600 border-gray-200 hover:text-gray-800'"
            [style.background-color]="activeFilter === d ? getColor(d) : ''"
            [style.border-color]="activeFilter === d ? getColor(d) : ''">
      <span class="inline-block w-2 h-2 rounded-full flex-shrink-0"
            [style.background-color]="getColor(d)"></span>
      {{ d }}
      <span class="opacity-60 font-normal">{{ getCount(d) }}</span>
    </button>
  </div>

  <!-- ── Map area ──────────────────────────────────────────────────── -->
  <div class="relative" style="height:420px">

    <!-- Loading -->
    <div *ngIf="loading"
         class="absolute inset-0 z-10 flex flex-col items-center justify-center bg-gray-50">
      <div class="w-10 h-10 rounded-full border-4 border-gray-200 border-t-indigo-500 animate-spin mb-3"></div>
      <p class="text-sm font-medium text-gray-500">Loading disease locations…</p>
    </div>

    <!-- No data -->
    <div *ngIf="!loading && totalLocations === 0"
         class="absolute inset-0 z-10 flex flex-col items-center justify-center bg-gray-50">
      <div class="bg-gray-100 rounded-full w-14 h-14 flex items-center justify-center mb-3">
        <svg class="w-7 h-7 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </div>
      <p class="text-sm font-semibold text-gray-500">No location data yet</p>
      <p class="text-xs text-gray-400 mt-1">Locations appear once users share GPS when scanning</p>
    </div>

    <!-- Leaflet map canvas -->
    <div #mapEl style="width:100%;height:100%;z-index:1"></div>

    <!-- Legend (bottom-right overlay) -->
    <div *ngIf="!loading && totalLocations > 0"
         class="absolute bottom-4 right-3 z-10 bg-white rounded-xl shadow-lg border border-gray-100 p-3"
         style="min-width:148px;max-width:190px;max-height:260px;overflow-y:auto">

      <div class="flex items-center gap-1.5 mb-2 pb-2 border-b border-gray-100">
        <svg class="w-3 h-3 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span class="text-xs font-semibold text-gray-600">
          {{ filteredCount }} detection{{ filteredCount !== 1 ? 's' : '' }}
        </span>
      </div>

      <ul class="space-y-1.5">
        <li *ngFor="let d of uniqueDiseases" class="flex items-center gap-2">
          <span class="inline-block w-2.5 h-2.5 rounded-full flex-shrink-0 ring-1 ring-white ring-offset-0 shadow-sm"
                [style.background-color]="getColor(d)"></span>
          <span class="text-xs text-gray-700 flex-1 truncate" [title]="d">{{ d }}</span>
          <span class="text-xs font-semibold text-gray-400">{{ getCount(d) }}</span>
        </li>
      </ul>

      <p class="text-xs text-gray-400 mt-2 pt-2 border-t border-gray-100">
        Circle size = confidence
      </p>
    </div>

  </div>
</div>
