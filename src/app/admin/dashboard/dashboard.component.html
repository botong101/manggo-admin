<!--loading-->
<div *ngIf="loading" class="min-h-screen bg-gradient-to-br from-green-50 via-white to-orange-50 flex items-center justify-center">
  <div class="text-center">
    <div class="relative w-20 h-20 mx-auto">
      <div class="animate-spin rounded-full h-20 w-20 border-4 border-green-200"></div>
      <div class="animate-spin rounded-full h-20 w-20 border-t-4 border-green-600 absolute inset-0"></div>
    </div>
    <div class="mt-6">
      <h3 class="text-lg font-semibold text-gray-700">Loading Dashboard</h3>
      <p class="text-sm text-gray-500 mt-1">Fetching your latest mango disease data...</p>
    </div>
  </div>
</div>

<!--error state-->
<div *ngIf="error && !loading" class="min-h-screen bg-gradient-to-br from-red-50 via-white to-orange-50 flex items-center justify-center">
  <div class="text-center max-w-md mx-auto p-8">
    <div class="bg-red-100 rounded-full w-16 h-16 mx-auto flex items-center justify-center mb-4">
      <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </div>
    <h3 class="text-xl font-semibold text-gray-800 mb-2">Oops! Something went wrong</h3>
    <p class="text-gray-600 mb-6">{{ error }}</p>
    <button (click)="refreshData()"
            class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-medium transition-colors duration-200 shadow-md hover:shadow-lg">
      <svg class="w-4 h-4 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Try Again
    </button>
  </div>
</div>

<!--dashboard content-->
<div *ngIf="!loading && !error" class="min-h-screen bg-gradient-to-br from-gray-50 via-white to-green-50">

  <!--header-->
  <div class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-8">
      <div>
        <h1 class="text-3xl font-bold text-gray-900">Dashboard Overview</h1>
        <p class="text-gray-600 mt-2 text-lg">Monitor your mango disease detection system performance</p>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-8 space-y-8">

    <!-- ── Stat cards ─────────────────────────────────────────────────── -->
    <app-stat-cards
      [totalImages]="totalImages"
      [healthyImages]="healthyImages"
      [diseasedImages]="diseasedImages">
    </app-stat-cards>

    <!-- ── Charts section ─────────────────────────────────────────────── -->
    <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">

      <!-- ══ Disease Location Heatmap (Map) ════════════════════════════ -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">

        <!-- header -->
        <div class="bg-gradient-to-r from-indigo-500 to-purple-600 px-6 py-4">
          <div class="flex items-center justify-between text-white">
            <div class="flex items-center space-x-3">
              <div class="bg-white bg-opacity-20 p-2 rounded-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
              </div>
              <div>
                <h2 class="text-lg font-bold">Disease Location Heatmap</h2>
                <p class="text-indigo-100 text-xs">Geographic spread of detected mango diseases</p>
              </div>
            </div>
            <div class="text-xs text-indigo-200 text-right">
              <p>Click a marker</p>
              <p>for details</p>
            </div>
          </div>
        </div>

        <!-- map component -->
        <app-disease-map></app-disease-map>

      </div>

      <!-- ══ Disease Trends ═════════════════════════════════════════════ -->
      <app-disease-trends
        [recentImages]="recentImages"
        [topDiseases]="topDiseases">
      </app-disease-trends>
    </div>
