<div *ngIf="diseases.length > 0">
  <h4 class="text-sm font-semibold text-gray-700 mb-3">Top Detected Diseases</h4>
  <div class="space-y-2">
    <div *ngFor="let d of diseases; let i = index"
         class="flex items-center justify-between py-2 px-3 bg-gray-50 hover:bg-gray-100 rounded-lg transition-colors duration-150">
      <div class="flex items-center space-x-3 min-w-0">
        <div class="w-6 h-6 shrink-0 rounded-full bg-red-100 flex items-center justify-center text-xs font-bold text-red-600">
          {{ i + 1 }}
        </div>
        <div class="min-w-0">
          <p class="font-medium text-gray-800 text-sm truncate" [title]="d.name">{{ d.name }}</p>
          <p class="text-xs text-gray-500">{{ d.type }} disease</p>
        </div>
      </div>
      <div class="text-right shrink-0 ml-3">
        <p class="font-bold text-gray-800 text-sm">{{ d.count | number }}</p>
        <p class="text-xs text-gray-500">{{ d.percentage }}%</p>
      </div>
    </div>
  </div>
</div>
